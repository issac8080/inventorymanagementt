<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="houseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4FD1C7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3182CE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4FD1C7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3182CE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="checkGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#63B3ED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C5282;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main house/envelope shape -->
  <path d="M 8 8 Q 8 4 12 4 L 28 4 Q 32 4 32 8 L 32 24 Q 32 28 28 28 L 12 28 Q 8 28 8 24 Z" 
        fill="url(#houseGradient)" 
        stroke="url(#houseGradient)" 
        stroke-width="1"/>
  
  <!-- Horizontal line (roofline/flap) -->
  <line x1="10" y1="10" x2="30" y2="10" 
        stroke="url(#lineGradient)" 
        stroke-width="1.5" 
        stroke-linecap="round"/>
  
  <!-- Checkmark -->
  <path d="M 18 16 L 22 20 L 28 12" 
        fill="none" 
        stroke="url(#checkGradient)" 
        stroke-width="2" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
</svg>

